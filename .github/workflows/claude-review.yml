name: claude-review
on:
  pull_request:
    types: [opened, synchronize]
jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review this PR against the repo laws in CLAUDE.md and per-directory CLAUDE.md files.
            Priorities: (1) engine single-writer/journal invariants, (2) programs trust law — settlement must
            remain proof-gated with no admin path, (3) design law in web (tokens, copy voice), (4) play-money
            invariant everywhere. Post findings as a review with file:line references; approve only if clean.
