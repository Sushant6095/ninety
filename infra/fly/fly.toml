# Fly.io deploy for OMNIPITCH live services on a PERSISTENT machine (Track 2).
# Why Fly and not Render: the uWebSockets.js live feed must never sleep — Render's free tier idles the machine
# and drops every WS connection. Here `auto_stop_machines = "off"` + `min_machines_running = 1` keep each
# process group's machine running 24/7.
#
# Runtimes: api + worker-ingest are Node 20 (uWS needs an LTS ABI); worker-cortex is Python 3.11. One image
# (infra/fly/Dockerfile) carries both; Fly `[processes]` runs the three as separate process groups. Note: Fly
# schedules each process group on its OWN machine — "one persistent stack", not literally one host — all kept
# alive by the auto-stop/min-running settings below.
#
# Deploy from the REPO ROOT so the whole pnpm monorepo is the build context:
#   fly deploy -c infra/fly/fly.toml
#
# Secrets are NEVER in this file — set with `fly secrets set -c infra/fly/fly.toml`. AUTHORITATIVE list, read from
# the code (ADR-072 audit) — the old list had a phantom `TXLINE_TOKEN` and missed the real TxLINE token vars:
#   REQUIRED — the app fails to boot without these:
#     DATABASE_URL   Supabase POOLER  (...pooler...:6543/postgres?pgbouncer=true&connection_limit=1)
#     DIRECT_URL     Supabase DIRECT  (db.<ref>.supabase.co:5432/postgres)  — Prisma reads it from the schema
#     REDIS_URL      Redis Cloud — bus + read caches, used by every process group (api/ingest/cortex/jobs)
#     JWT_SECRET, EMBEDDED_WALLET_SECRET   — assertSecretsAtBoot() throws in production if either is unset
#   TxLINE live ingest (worker-ingest/liveAuth.ts — the deployed worker uses PRE-OBTAINED tokens, never signs SOL):
#     TXLINE_NETWORK=devnet · TXLINE_DEVNET_JWT · TXLINE_DEVNET_API_TOKEN   (from scripts/txline-devnet-argeng.mjs)
#     TXLINE_DEVNET_RPC_URL, TXLINE_BASE_URL   — optional, default to the devnet origins
#   OPTIONAL — the feature degrades gracefully if unset:
#     ANTHROPIC_API_KEY (booth → template narrator) · TELEGRAM_BOT_TOKEN + EARLYWHISTLE_CHANNEL (EarlyWhistle) ·
#     HELIUS_WEBHOOK_SECRET (Helius webhook) · ADMIN_TOKEN (replay) · MOMENTS_ONCHAIN (default off) ·
#     OMNIPITCH_PROGRAM_ID + SOLANA_CLUSTER (chain reads) · APP_URL (absolute links)
#   NOTE: the schema is ALREADY applied to Supabase (via the Supabase MCP) — do NOT run `prisma migrate deploy`.

app = "omnipitch"
primary_region = "iad"

[build]
  dockerfile = "infra/fly/Dockerfile"

# FOUR processes — a missing one silently breaks a whole capability (no cortex = no prices; no jobs = no
# settlement/booth/moments). Fly schedules each group on its own machine, all kept alive below.
[processes]
  api    = "pnpm --filter @omnipitch/api exec tsx src/main.ts"
  ingest = "pnpm --filter @omnipitch/worker-ingest exec tsx src/main.ts"
  cortex = "sh -c 'cd apps/worker-cortex && PYTHONPATH=src .venv/bin/python -m cortex.main'"
  jobs   = "pnpm --filter @omnipitch/worker-jobs exec tsx src/main.ts"

[env]
  NODE_ENV   = "production"
  BUS_DRIVER = "redis"
  WS_PORT    = "4001"

# REST (Fastify, :4000) — api process group only.
[http_service]
  internal_port       = 4000
  force_https         = true
  auto_stop_machines  = "off"
  auto_start_machines = false
  min_machines_running = 1
  processes           = ["api"]

# Live WS (uWebSockets.js, :4001) — dedicated TLS entrypoint, api process group only.
[[services]]
  internal_port      = 4001
  protocol           = "tcp"
  processes          = ["api"]
  auto_stop_machines = "off"
  min_machines_running = 1
  [[services.ports]]
    port     = 8443
    handlers = ["tls"]

# Persistent VM sizing for all four process groups. COST-CAUTIOUS (ADR-072): Fly has NO free tier (2024 cut) —
# every machine is pay-as-you-go, so this is the smallest safe size. 512MB comfortably runs the Node api/uWS and
# the cortex numpy/scipy worker at rest. If cortex OOMs on deploy (penaltyblog import), bump ONLY cortex to 1gb via
# a second [[vm]] block. For a hackathon: deploy for the demo window, then `fly apps destroy` to stop the meter.
[[vm]]
  cpu_kind  = "shared"
  cpus      = 1
  memory    = "512mb"
  processes = ["api", "ingest", "cortex", "jobs"]
